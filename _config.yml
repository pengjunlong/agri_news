# Site
title: 农业资讯日报
baseurl: "/agri_news"
description: "每日自动聚合农业资讯，聚焦机械化、家庭农场、农业政策，来源：农业农村部、中国农网、第一财经、虎嗅"
include:
  - _data
  - subsite-config.json

# Theme
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: dark
markdown: kramdown
search: true

# Permalink & pagination
permalink: /:year/:month/:day/:title/
paginate: 5
paginate_path: /page:num/

# TOC
toc:
  icon: "file-text"
  min_items: 2

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Author
author:
  name: "Junlong Peng"
  avatar: "https://avatars.githubusercontent.com/u/1436509?v=4"
  bio: "每日农业资讯自动聚合，聚焦机械化、家庭农场、农村政策..."
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://pengjunlong.github.io/"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://pengjunlong.github.io/"

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single-with-ga
      author_profile: true
      read_time: true
      share: true
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single-with-ga
      author_profile: true

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

